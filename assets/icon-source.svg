<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Floating bubbles -->
  <circle cx="400" cy="100" r="25" fill="rgba(255,255,255,0.2)"/>
  <circle cx="420" cy="380" r="18" fill="rgba(255,255,255,0.15)"/>
  <circle cx="90" cy="400" r="20" fill="rgba(255,255,255,0.18)"/>
  <circle cx="380" cy="420" r="12" fill="rgba(255,255,255,0.12)"/>
  
  <!-- Modern RSS with gradient arcs and offset -->
  <g fill="none" stroke-linecap="round">
    <!-- Offset shadow effect -->
    <path d="M145 80 a275 275 0 0 1 290 190" stroke="#ffffff" stroke-width="42" opacity="0.15"/>
    
    <!-- Main arcs with gradient -->
    <path d="M140 75 a280 280 0 0 1 285 185" stroke="url(#arcGrad)" stroke-width="38"/>
    <path d="M140 160 a200 200 0 0 1 200 165" stroke="url(#arcGrad)" stroke-width="34"/>
    <path d="M140 245 a120 120 0 0 1 120 90" stroke="url(#arcGrad)" stroke-width="30"/>
  </g>
  
  <!-- 3D-style center dot with layers -->
  <circle cx="140" cy="335" r="40" fill="#ffffff"/>
  <circle cx="138" cy="333" r="32" fill="rgba(255,200,220,0.3)"/>
  <circle cx="140" cy="335" r="55" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.4"/>
  <circle cx="140" cy="335" r="68" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2"/>
  
  <!-- Sparkle constellation -->
  <g fill="#ffffff">
    <circle cx="380" cy="140" r="9"/>
    <circle cx="400" cy="190" r="6"/>
    <circle cx="340" cy="90" r="7"/>
    <circle cx="420" cy="240" r="4"/>
  </g>
  
  <!-- Tiny accent dots -->
  <circle cx="320" cy="70" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="430" cy="300" r="4" fill="#ffffff" opacity="0.5"/>
</svg>