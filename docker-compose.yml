services:
  rss-aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rss-aggregator
    restart: unless-stopped
    ports:
      - "51085:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s