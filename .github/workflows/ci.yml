name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  # ── Backend (Python) ──────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run ruff check .

  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync

      - name: Type check
        run: uv run mypy src/ --ignore-missing-imports --disable-error-code=import-untyped

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync

      - name: Run migrations
        run: |
          mkdir -p data
          uv run alembic upgrade head
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/rss.db

      - name: Test
        run: uv run pytest -q
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/rss.db

  # ── Frontend (Node.js) ─────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  frontend-unit-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test:run

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_PROXY_TARGET: http://localhost:8000

      - name: Serve frontend (background)
        run: |
          export VITE_API_PROXY_TARGET=http://localhost:8000
          nohup pnpm vite preview --port 8080 --strictPort > /tmp/vite.log 2>&1 &
          # Wait for frontend to be ready
          for i in $(seq 1 30); do
            sleep 1
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Frontend ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30s)"
          done
          echo "Frontend failed to start. Log:"
          cat /tmp/vite.log
          exit 1

      - name: Run API (background)
        run: |
          set -x
          mkdir -p ../data
          cd ..
          uv run alembic upgrade head
          nohup uv run uvicorn src.main:app --port 8000 > /tmp/uvicorn.log 2>&1 &
          API_PID=$!
          echo "Uvicorn started with PID: $API_PID"
          # Wait for API with proper timeout
          for i in $(seq 1 60); do
            sleep 2
            # Check health first - don't misreport slow-starting API as dead
            resp=$(curl -sf http://localhost:8000/health 2>&1)
            if [ $? -eq 0 ]; then
              echo "API is ready: $resp"
              exit 0
            fi
            # Then check if process is still running
            if ! kill -0 $API_PID 2>/dev/null; then
              echo "Uvicorn process died! Log:"
              cat /tmp/uvicorn.log
              echo "Process status:"
              ps aux | grep -E "(uvicorn|python)" | grep -v grep || true
              exit 1
            fi
            echo "Waiting for API... ($((i*2))s/120s) Response: $resp"
          done
          echo "API failed to start. Log:"
          cat /tmp/uvicorn.log
          echo "Process status at timeout:"
          ps aux | grep -E "(uvicorn|python)" | grep -v grep || true
          exit 1
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/rss.db
          ALLOWED_ORIGINS: "*"
          REQUIRE_API_KEY: "false"
          DEFAULT_API_KEY: "test-api-key-for-ci"
          SCHEDULER_ENABLED: "false"
          LOG_LEVEL: "debug"

      - name: E2E
        run: pnpm test:e2e --reporter=line
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/test-results/

  # ── Docker ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: rss-aggregator:api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: false
          tags: rss-aggregator:web
          cache-from: type=gha
          cache-to: type=gha,mode=max
