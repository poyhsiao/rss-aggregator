name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  # ── Backend (Python) ──────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run ruff check .

  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync

      - name: Type check
        run: uv run mypy src/ --ignore-missing-imports --disable-error-code=import-untyped

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync

      - name: Run migrations
        run: |
          mkdir -p data
          uv run alembic upgrade head
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/rss.db

      - name: Test
        run: uv run pytest -q
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/rss.db

  # ── Frontend (Node.js) ─────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
          package_json_file: web/package.json

      - name: Lint
        run: |
          pnpm --filter rss-aggregator-web exec vue-tsc --noEmit

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
          package_json_file: web/package.json

      - name: Type check
        run: |
          pnpm --filter rss-aggregator-web exec vue-tsc --noEmit

  frontend-unit-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
          package_json_file: web/package.json

      - name: Test
        run: pnpm --filter rss-aggregator-web exec vitest run

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
          package_json_file: web/package.json

      - name: Build
        run: pnpm --filter rss-aggregator-web exec vite build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_PROXY_TARGET: http://localhost:8000

      - name: Install Playwright browsers
        run: pnpm --filter rss-aggregator-web exec playwright install --with-deps chromium

      - name: Run API (background)
        run: |
          mkdir -p data
          uv run alembic upgrade head
          nohup uv run uvicorn src.main:app --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 60); do
            sleep 1
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API ready"
              exit 0
            fi
          done
          echo "API failed. Log:"
          cat /tmp/uvicorn.log
          exit 1
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/rss.db
          ALLOWED_ORIGINS: "*"
          REQUIRE_API_KEY: "false"
          DEFAULT_API_KEY: "test-api-key-for-ci"
          SCHEDULER_ENABLED: "false"
          LOG_LEVEL: "debug"

      - name: Serve frontend
        run: |
          export VITE_API_PROXY_TARGET=http://localhost:8000
          nohup pnpm --filter rss-aggregator-web exec vite preview -- --port 8080 --outDir web/dist > /tmp/vite.log 2>&1 &
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Frontend ready"
              exit 0
            fi
          done
          echo "Frontend failed. Log:"
          cat /tmp/vite.log
          exit 1

      - name: E2E
        run: pnpm --filter rss-aggregator-web exec playwright test --reporter=line
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/test-results/

  # ── Docker ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
          package_json_file: web/package.json

      - name: Build frontend
        run: |
          pnpm --filter rss-aggregator-web exec vite build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: rss-aggregator:api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: false
          tags: rss-aggregator:web
          cache-from: type=gha
          cache-to: type=gha,mode=max
